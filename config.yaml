# PollGrid — every tunable lives here. Schema-validated at boot (core/config_schema.py);
# a bad type, range, or unknown key fails the whole process loudly before migrate() runs.

server:
  port: 8811
  host: 127.0.0.1

database:
  path: data/pollgrid.db

ingestion:
  intervals_seconds:
    polls: 900              # 15 min
    fec: 3600
    fec_catchup: 5          # while the roster is unsynced, drain pages back-to-back
                            # so race_candidates (which polls need) fills in minutes
    census: 86400           # daily check; the data itself changes far less often
    congress_gov: 3600
    news_rss: 120
    targeted_search: 600
    markets: 300
    social: 900
    results_native: 30      # tightened by election-night mode (ingestion/scheduler.py)
  live_recompute_seconds: 180        # LIGHT deterministic pass (competitiveness +
                                     # averages + active-race forecasts) — fast, frequent
  live_recompute_heavy_seconds: 1800  # HEAVY pass (full sweep + 20k-sim chamber
                                      # models); rare + skipped when no new data landed
  election_night:
    results_native_seconds: 15
  ap_elections:
    enabled: false          # flip true only once an AP account exists
    api_key_env: AP_ELECTIONS_API_KEY
  resilience:
    backoff_multiplier: 2.0
    max_backoff_seconds: 1800
    down_after_failures: 3
  budgets:                  # daily request budgets for anything rate-capped
    census: 400
    fec: 900
    congress_gov: 500
    targeted_search: 4000   # Google News RSS: budget-capped, competitiveness-rotated
    lda: 300                # Senate LDA lobbying API
  news_recency_hours: 48    # older landings are archival — extracted & citable, never "new"
  debate_window:
    poll_seconds: 120       # transcript polling cadence inside a scheduled debate window
  social_x:
    enabled: false          # paid X API tier — gated exactly like AP Elections
    api_key_env: X_API_BEARER_TOKEN
    handles: []             # tracked politician/campaign handles once enabled

polling:
  averaging:
    recency_half_life_days: 14
    house_effect_adjustment: true
    min_sample_size: 300
    weight_by_sample_size: true
    herding_discount: true        # same-window multi-pollster bursts share information;
    herding_window_days: 3        # their combined weight is discounted (addendum §1.3)
  regional_ratings_min_graded: 10 # per-region house effects only past this graded count

fundamentals:
  weights:                  # must sum to 1.0, validator checks it
    incumbency: 0.20
    generic_ballot: 0.25
    economic_index: 0.20
    partisan_lean: 0.25
    fundraising_ratio: 0.10
  competitiveness_bands:    # |dem_score| thresholds bootstrapping race.competitiveness
    tossup_max: 0.05        # from fundamentals alone before polls exist (never invented —
    lean_max: 0.15          # a race with zero real signal stays 'unrated', not 'tossup')
    likely_max: 0.30

correlation:
  same_window_similarity_threshold: 0.78
  historical_similarity_threshold: 0.85
  same_window_max_gap_hours: 72

volatility:
  z_window: 14
  cusum_k: 0.5
  cusum_h: 4.0

forecasting:
  enabled: false            # per-category visibility earned via the Brier backtest
  brier_ceiling: 0.20
  min_graded_predictions: 20
  auto_enable_earned: true
  margin_scale: 4.0         # logistic scale: pts of margin per ~unit log-odds
  fundamentals_weight_with_polls: 0.35

election_night_calling:
  callable_margin_factor: 1.0   # CALLABLE when leader margin > est. remaining votes * factor

chamber_simulation:
  n_sims: 20000
  national_shock_sd: 0.025
  senate_not_up_dem: 24     # seats not up in the modeled cycle (update per cycle)
  senate_not_up_rep: 43

modeling:
  district_interpolation:
    grid_n: 24              # n×n sample grid per county for areal-share estimation;
                            # higher = finer district-split resolution, slower backfill

genius_layer:
  ensemble_method: elastic_net_logistic
  refit_interval_days: 1
  l1_ratio: 0.5
  alpha: 0.1
  context_pack_token_budget: 30000
  event_rescore_min_gap_minutes: 30   # debounce for the event-driven factor rescore

llm_provider:
  primary: ollama_local
  fallback_order: [groq_free, anthropic, openrouter]
  ollama:
    default_model: qwen3:30b-a3b   # MoE, ~3B active params — fast despite the 30B size;
                                    # ~21GB VRAM once loaded, confirmed 100% GPU + ~4s
                                    # per short call on a 24GB+ card (measured on a 5090)
    fallback_model: qwen3:14b      # smaller escape hatch for weaker GPUs; also what a
                                    # timed-out interactive call retries with
    upgrade_model: llama3.3:70b    # opt-in, for anyone deliberately choosing max quality
                                    # over speed on a card with the VRAM to spare
    host: http://localhost:11434
    interactive_timeout_seconds: 300  # a full context pack (~30k tokens) is a lot for a
                                       # local model to prefill+generate; 120s is too tight

analyst:
  queue_lanes: 2            # interactive preempts background (queue-jump; in-flight bg canceled)

demographics:
  sync_cadence_days: 30
  min_population_threshold: 0

election_night:
  auto_publish_calls: false   # ALSO hardcoded False in modeling/race_calling.py — this key is display-only

synthetic:
  allow_seed_demo: true       # scripts/seed_demo.py refuses to run when false
