<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PollGrid</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='16'%20height='16'%3E%3Crect%20width='16'%20height='16'%20rx='3'%20fill='%232456a6'/%3E%3Ctext%20x='8'%20y='12'%20font-size='11'%20text-anchor='middle'%20fill='white'%20font-family='serif'%3EP%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="/styles.css">
</head>
<body data-theme="newsroom">

  <header id="topbar">
    <div class="wordmark" title="PollGrid — US political intelligence">
      <span class="wordmark-glyph">&#x26CA;</span>
      <span class="wordmark-text">Poll<b>Grid</b></span>
      <span class="version-badge" id="version-badge" title="platform version">v3.0</span>
    </div>

    <nav id="topnav" class="topnav">
      <a href="#/">Map</a>
      <a href="#/elections">Elections</a>
      <a href="#/polls">Polls</a>
      <a href="#/builder">Builder</a>
      <a href="#/scorecard">Scorecard</a>
      <a href="#/lobbies">Influence</a>
      <a href="#/analyst">Analyst</a>
      <a href="#/settings">Settings</a>
      <a href="#/diagnostics">Status</a>
    </nav>

    <div class="topbar-right">
      <span id="en-chip" class="en-chip" hidden>ELECTION NIGHT</span>
      <label class="theme-picker">
        <select id="theme-select" title="Theme">
          <option value="graphite">Graphite &amp; Brass</option>
          <option value="broadcast">Broadcast Night</option>
          <option value="midnight">Midnight</option>
          <option value="carbon">Carbon</option>
          <option value="evergreen">Evergreen</option>
          <option value="sunset">Sunset</option>
          <option value="oceanic">Oceanic</option>
          <option value="newsroom">Newsroom (light)</option>
          <option value="contrast">High Contrast</option>
        </select>
      </label>
      <button id="sound-toggle" class="icon-btn" title="Toggle sound">&#x1D11E;</button>
      <span class="palette-hint" id="palette-hint" title="Command palette">Ctrl+K</span>
    </div>
  </header>

  <div id="chyron" hidden aria-label="Election-night ticker"></div>

  <div id="shell">
    <aside id="pane" class="pane" aria-label="Detail pane"></aside>

    <main id="stage">
      <div id="map-root" aria-label="Map"></div>
      <div id="map-hud"></div>
      <div id="en-root"></div>
      <div id="view-root" hidden></div>
      <div id="asof-banner" class="asof-banner" hidden></div>
    </main>

    <aside id="feed" class="feed" aria-label="Live feed"></aside>
  </div>

  <footer id="scrubber"></footer>

  <div id="palette-root"></div>
  <div id="toasts" aria-live="polite"></div>

  <script type="module" src="/src/App.js"></script>
</body>
</html>
